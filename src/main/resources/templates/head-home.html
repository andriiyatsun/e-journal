<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Панель Голови Відділу</title>
    <link rel="stylesheet" th:href="@{/css/admin-dashboard.css}" />
    <link rel="stylesheet" th:href="@{/css/journal.css}" />
</head>
<body>

<header class="site-header">
    <div class="container">
        <div class="header-left">
            <span class="brand">
                <span class="brand__logo"></span>
                <span class="brand__title">Панель Голови Відділу</span>
            </span>
        </div>
        <nav class="header-tabs">
            <button class="tab-btn active">Журнали відділу</button>
        </nav>
        <div class="header-right">
            <form th:action="@{/logout}" method="post" style="margin: 0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn--danger">Вийти</button>
            </form>
        </div>
    </div>
</header>

<main class="page">
    <div class="card">
        <h3 class="section-title">
            Відділ: <span th:text="${departmentName}" style="color: var(--primary);"></span>
        </h3>

        <div th:if="${departmentName == 'Не призначено'}" class="alert alert--warning" style="margin-bottom: 1rem;">
            <strong>Увага:</strong> Вам ще не призначено відділ. Зверніться до адміністратора.
        </div>

        <table class="table" th:if="${!#lists.isEmpty(journals)}">
            <thead>
            <tr>
                <th>Назва гуртка (Журналу)</th>
                <th>Навчальний рік</th>
                <th>Викладачі</th>
                <th style="width: 150px; text-align: center;">Дії</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="j : ${journals}">
                <td th:text="${j.subject.name}"></td>
                <td th:text="${j.academicYear.name}"></td>
                <td>
                    <span th:if="${#lists.isEmpty(j.teachers)}" class="helper">Не призначено</span>
                    <span th:each="t, iter : ${j.teachers}">
                            <span th:text="${t.name + ' ' + t.surname}"></span><span th:if="!${iter.last}">, </span>
                        </span>
                </td>
                <td style="text-align: center;">
                    <a th:href="@{/journal/{id}(id=${j.id})}" class="btn btn--primary" style="text-decoration: none; padding: 0.4rem 0.8rem; font-size: 0.9rem;">
                        Переглянути
                    </a>
                </td>
            </tr>
            </tbody>
        </table>

        <p class="helper" th:if="${#lists.isEmpty(journals) and departmentName != 'Не призначено'}" style="margin-top: 1rem;">
            У цьому відділі поки немає створених журналів.
        </p>
    </div>
</main>

</body>
</html>
