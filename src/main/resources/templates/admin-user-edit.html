<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редагування користувача</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg:#f5f5f5; --card:#fff; --text:#333; --muted:#555;
            --primary:#007bff; --primary-hover:#0056b3; --border:#ddd;
            --shadow:0 2px 10px rgba(0,0,0,.1); --radius:8px
        }
        body { margin:0; font-family: Arial, sans-serif; background:var(--bg); color:var(--text) }
        .page { max-width:600px; margin:2rem auto; padding:0 1rem; }

        form { background:var(--card); padding:1.5rem 2rem; border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); }
        h2 { margin-top:0; margin-bottom:1.5rem; font-size:1.3rem; border-bottom:1px solid var(--border); padding-bottom:.5rem; }

        .form-group { margin-bottom:1.2rem; }
        label { display:block; margin-bottom:.4rem; color:var(--muted); font-weight:bold; font-size:.9rem; }
        input, select { width:100%; padding:.65rem; border:1px solid var(--border); border-radius:6px; box-sizing:border-box; font-size:.95rem; }
        input:focus, select:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 2px rgba(0,123,255,.25); }

        .row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
        .helper { font-size:0.8rem; color:var(--muted); margin-top:.3rem; }

        .actions { display:flex; gap:.75rem; margin-top:2rem; justify-content:flex-end; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: .5rem 1rem; border-radius: 6px; border: 1px solid var(--border);
            background: #fff; cursor: pointer; text-decoration: none; font-size: .95rem; color: var(--text);
            transition: all .2s;
        }
        .btn:hover { background: #f9f9f9; }
        .btn--primary { background:var(--primary); border-color:var(--primary); color:#fff; }
        .btn--primary:hover { background:var(--primary-hover); color:#fff; }
    </style>
</head>
<body>
<main class="page">
    <!-- ЗМІНЕНО: Використовуємо чисту змінну actionUrl замість складної логіки -->
    <form th:action="@{${actionUrl}}" method="post">

        <h2 th:text="${role == 'ROLE_HEAD' ? 'Редагувати голову відділу' : 'Редагувати адміністратора'}">Редагування</h2>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="row form-group">
            <div>
                <label>Ім’я</label>
                <input name="name" th:value="${user.name}" required/>
            </div>
            <div>
                <label>Прізвище</label>
                <input name="surname" th:value="${user.surname}" required/>
            </div>
        </div>

        <div class="form-group">
            <label>Email (Логін)</label>
            <input type="email" name="email" th:value="${user.email}" required/>
        </div>

        <div class="form-group">
            <label>Новий пароль</label>
            <input type="password" name="password"/>
            <div class="helper">Залиште порожнім, якщо не бажаєте змінювати пароль.</div>
        </div>

        <!-- Поле "Відділ" відображається лише для голів відділу -->
        <div class="form-group" th:if="${role == 'ROLE_HEAD'}">
            <label>Призначений відділ</label>
            <select name="departmentId">
                <option value="">-- Не обрано --</option>
                <!-- ЗМІНЕНО: Безпечна перевірка user.department?.id -->
                <option th:each="d : ${departments}" th:value="${d.id}"
                        th:selected="${user.department?.id == d.id}"
                        th:text="${d.name}"></option>
            </select>
        </div>

        <div class="actions">
            <!-- ЗМІНЕНО: Використовуємо чисту змінну cancelUrl -->
            <a class="btn" th:href="@{${cancelUrl}}">Скасувати</a>
            <button class="btn btn--primary" type="submit">Зберегти зміни</button>
        </div>
    </form>
</main>
</body>
</html>
