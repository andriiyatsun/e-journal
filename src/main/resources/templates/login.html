<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вхід</title>
    <link rel="stylesheet" th:href="@{/css/login.css}" />
</head>
<body>

<div class="login-container">
    <h2>Електронний журнал КПДЮ</h2>

    <div th:if="${param.error}" class="alert alert-danger">Невірний email або пароль</div>
    <div th:if="${param.logout}" class="alert alert-success">Ви вийшли із системи</div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="email">Email користувача:</label>
            <input type="text" id="email" name="username" required placeholder="name@ejournal.local">
        </div>

        <div class="form-group">
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required>
        </div>

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn">Увійти</button>
    </form>
</div>

</body>
</html>
